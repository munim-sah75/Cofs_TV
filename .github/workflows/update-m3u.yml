name: Update M3U File Every 5 Minutes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download, modify, and merge M3U files
        run: |
          # Download files
          curl -s -L "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.m3u" -o fancode.m3u
          curl -s -L "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u" -o tapmad_bd.m3u
          curl -s -L "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u" -o sonyliv_playlist.m3u

          # Process all files:
          # 1. Replace https://in- → https://bd-
          # 2. Change all group-title to Fancode
          for file in fancode.m3u tapmad_bd.m3u sonyliv_playlist.m3u; do
            sed -i 's|https://in-|https://bd-|g' "$file"
            sed -i 's|group-title="[^"]*"|group-title="Fancode"|g' "$file"
          done

          # Merge into final file
          cat fancode.m3u > merged.m3u
          echo "" >> merged.m3u
          cat tapmad_bd.m3u >> merged.m3u
          echo "" >> merged.m3u
          cat sonyliv_playlist.m3u >> merged.m3u

          # Replace original output file
          mv merged.m3u fancode.m3u

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add fancode.m3u

          if ! git diff --cached --quiet; then
            git commit -m "Auto-update merged M3U playlists"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected, skipping commit."
          fi
