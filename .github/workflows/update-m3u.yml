name: Update Fancode Playlist Every 5 Minutes

on:
  schedule:
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download, modify, and merge playlists
        run: |
          # Download files
          curl -s -L "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.m3u" -o fancode.m3u
          curl -s -L "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u" -o tapmad_bd.m3u
          curl -s -L "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u" -o sonyliv_playlist.m3u

          # Process all files
          for file in fancode.m3u tapmad_bd.m3u sonyliv_playlist.m3u; do
            sed -i 's|https://in-|https://bd-|g' "$file"
            sed -i 's|group-title="[^"]*"|group-title="Fancode"|g' "$file"
          done

          # Merge into final file
          cat fancode.m3u > merged.m3u
          echo "" >> merged.m3u
          cat tapmad_bd.m3u >> merged.m3u
          echo "" >> merged.m3u
          cat sonyliv_playlist.m3u >> merged.m3u

          mv merged.m3u fancode.m3u

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add fancode.m3u

          if ! git diff --cached --quiet; then
            git commit -m "Auto-update Fancode playlist"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected."
          fi
